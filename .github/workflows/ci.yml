name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Type check
        run: uv run mypy src/

      - name: Safety check (SAFE-01)
        run: |
          if grep -r "RealBridge" tests/ --include="*.py" -l; then
            echo "ERROR: Test files must not reference RealBridge (SAFE-01)"
            echo "Use InMemoryBridge or SimulatorBridge for automated testing."
            exit 1
          fi

      - name: Test
        run: uv run pytest --cov-fail-under=80
