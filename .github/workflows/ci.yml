name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Type check
        run: uv run mypy src/

      - name: Safety check (SAFE-01)
        run: |
          # SAFE-01: No test may use RealBridge directly.
          # Allowed references:
          #   - tests/doubles/ (SimulatorBridge inherits RealBridge — the approved path)
          #   - test_smoke.py, test_ipc_engine.py (verify SAFE-01 enforcement itself)
          violations=$(grep -r "RealBridge" tests/ --include="*.py" --exclude-dir=doubles -l \
            | grep -v "test_smoke\.py" \
            | grep -v "test_ipc_engine\.py" || true)
          if [ -n "$violations" ]; then
            echo "$violations"
            echo "ERROR: Test files must not reference RealBridge (SAFE-01)"
            echo "Use InMemoryBridge or SimulatorBridge for automated testing."
            echo "Allowed: tests/doubles/ (infrastructure), test_smoke.py, test_ipc_engine.py (enforcement tests)"
            exit 1
          fi

      - name: Test
        run: uv run pytest --cov-fail-under=80

  deploy-pages:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
